<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Clipteca — tu videoteca de enlaces</title>
<meta name="description" content="Guarda enlaces de video de tus redes favoritas, organizados por categoría, con vista previa grande.">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#110F16">
<link rel="icon" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__mark" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#FF4D6D"/><path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#FDFBF8"/></svg>
      </span>
      <h1>Clipteca</h1>
    </div>
    <div class="topbar__actions">
      <button class="icon-btn" id="searchToggle" aria-label="Buscar" aria-expanded="false">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
      <button class="icon-btn" id="manageCatsBtn" aria-label="Administrar categorías">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h10M4 18h6"/></svg>
      </button>
    </div>
  </header>

  <!-- Search bar (collapsible) -->
  <div class="searchbar" id="searchBar" hidden>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar por título…" autocomplete="off">
  </div>

  <!-- Category rail -->
  <nav class="cat-rail" id="catRail" aria-label="Categorías">
    <!-- chips injected by JS -->
  </nav>

  <!-- Main content -->
  <main id="grid" class="grid" aria-live="polite">
    <!-- cards injected by JS -->
  </main>

  <!-- Empty state -->
  <div class="empty" id="emptyState" hidden>
    <div class="empty__icon">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#524C5E" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M9 9l6 3-6 3V9z" fill="#524C5E" stroke="none"/></svg>
    </div>
    <p class="empty__title" id="emptyTitle">Todavía no hay nada guardado</p>
    <p class="empty__body" id="emptyBody">Pega el enlace de un video y arma tu propia videoteca por categorías.</p>
    <button class="btn btn--primary" id="emptyAddBtn">Añadir tu primer enlace</button>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabAdd" aria-label="Añadir enlace">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

</div>

<!-- Add / Edit link modal -->
<div class="modal-overlay" id="linkModalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="linkModalTitle">
    <div class="modal__header">
      <h2 id="linkModalTitle">Añadir enlace</h2>
      <button class="icon-btn" id="linkModalClose" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="modal__body">
      <label class="field-label" for="urlInput">Enlace del video</label>
      <div class="url-row">
        <input type="url" id="urlInput" placeholder="https://…" inputmode="url" autocomplete="off">
        <button class="btn btn--secondary" id="fetchPreviewBtn">Obtener vista previa</button>
      </div>

      <div class="preview-area" id="previewArea" hidden>
        <div class="preview-image-wrap">
          <img id="previewImage" alt="" class="preview-image">
          <span class="platform-badge" id="platformBadge"></span>
        </div>

        <div class="manual-image-row" id="manualImageRow" hidden>
          <label class="field-label" for="manualImageInput">No encontramos imagen — pega una URL de imagen (opcional)</label>
          <input type="url" id="manualImageInput" placeholder="https://…imagen.jpg">
        </div>

        <label class="field-label" for="titleInput">Título</label>
        <input type="text" id="titleInput" placeholder="Título del video" maxlength="120">

        <label class="field-label" for="categorySelect">Categoría</label>
        <div class="cat-select-row">
          <select id="categorySelect"></select>
          <button class="btn btn--ghost" id="newCatFromModalBtn" type="button">+ Nueva</button>
        </div>
      </div>

      <p class="preview-status" id="previewStatus" hidden></p>
    </div>

    <div class="modal__footer">
      <button class="btn btn--text" id="linkCancelBtn">Cancelar</button>
      <button class="btn btn--primary" id="linkSaveBtn" disabled>Guardar enlace</button>
    </div>
  </div>
</div>

<!-- New category modal -->
<div class="modal-overlay" id="catModalOverlay" hidden>
  <div class="modal modal--small" role="dialog" aria-modal="true" aria-labelledby="catModalTitle">
    <div class="modal__header">
      <h2 id="catModalTitle">Nueva categoría</h2>
      <button class="icon-btn" id="catModalClose" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <label class="field-label" for="newCatInput">Nombre</label>
      <input type="text" id="newCatInput" placeholder="Ej. Recetas, Entrenamientos, Ideas…" maxlength="30">
      <label class="field-label">Color</label>
      <div class="swatch-row" id="swatchRow"></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--text" id="catCancelBtn">Cancelar</button>
      <button class="btn btn--primary" id="catSaveBtn">Crear categoría</button>
    </div>
  </div>
</div>

<!-- Manage categories modal -->
<div class="modal-overlay" id="manageModalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="manageModalTitle">
    <div class="modal__header">
      <h2 id="manageModalTitle">Administrar categorías</h2>
      <button class="icon-btn" id="manageModalClose" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <ul class="manage-list" id="manageList"></ul>
      <button class="btn btn--secondary" id="manageAddCatBtn" style="margin-top:14px;width:100%;">+ Añadir categoría</button>
    </div>
    <div class="modal__footer">
      <button class="btn btn--primary" id="manageDoneBtn">Listo</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="modal-overlay" id="confirmOverlay" hidden>
  <div class="modal modal--small" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="modal__body" style="padding-top:24px;">
      <p class="confirm__title" id="confirmTitle"></p>
      <p class="confirm__body" id="confirmBody"></p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--text" id="confirmCancelBtn">Cancelar</button>
      <button class="btn btn--danger" id="confirmOkBtn">Eliminar</button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-stack" id="toastStack" aria-live="assertive"></div>

<script src="app.js"></script>
</body>
</html>
